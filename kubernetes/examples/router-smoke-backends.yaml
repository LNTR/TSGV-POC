apiVersion: apps/v1
kind: Deployment
metadata:
  name: tgn-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tgn-backend
  template:
    metadata:
      labels:
        app: tgn-backend
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-text=tgn-backend"
            - "-listen=:5678"
          ports:
            - containerPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tall-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tall-backend
  template:
    metadata:
      labels:
        app: tall-backend
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-text=tall-backend"
            - "-listen=:5678"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: tgn-visual-preprocessing-service
spec:
  selector:
    app: tgn-backend
  ports:
    - name: http
      port: 8001
      targetPort: 5678
---
