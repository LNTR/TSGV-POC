apiVersion: apps/v1
kind: Deployment
metadata:
  name: tgn-visual-preprocessing-service
  labels:
    app.kubernetes.io/part-of: router-smoke-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tgn-visual-preprocessing-service
  template:
    metadata:
      labels:
        app: tgn-visual-preprocessing-service
        app.kubernetes.io/part-of: router-smoke-demo
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-text=tgn-visual-preprocessing-service"
            - "-listen=:5678"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: tgn-visual-preprocessing-service
  labels:
    app.kubernetes.io/part-of: router-smoke-demo
spec:
  selector:
    app: tgn-visual-preprocessing-service
  ports:
    - name: http
      port: 8001
      targetPort: 5678
---
